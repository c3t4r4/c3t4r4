name: Generate pacman animation

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Salvar SVGs em assets/
        run: |
          mkdir -p assets
          cp dist/pacman-contribution-graph.svg assets/pacman-contribution-graph.svg
          cp dist/pacman-contribution-graph-dark.svg assets/pacman-contribution-graph-dark.svg

      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/pacman-contribution-graph.svg assets/pacman-contribution-graph-dark.svg
          git diff --staged --quiet || git commit -m "chore: atualizar animação pacman"
          git push
