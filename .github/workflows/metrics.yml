name: GitHub Metrics

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Stats gerais
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/github-metrics.svg
          base: header, activity, community, repositories
          config_timezone: America/Sao_Paulo

      - name: Linguagens mais usadas
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/github-langs.svg
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          config_timezone: America/Sao_Paulo

      - name: Calendário isométrico
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/github-isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: America/Sao_Paulo

  generate-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Snake dark/light
        uses: Platane/snk@v3
        with:
          github_user_name: c3t4r4
          outputs: |
            assets/github-snake.svg
            assets/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit snake
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/github-snake.svg assets/github-snake-dark.svg
          git diff --staged --quiet || git commit -m "chore: atualizar animação snake"
          git push
